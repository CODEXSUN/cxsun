server {
  listen 80;
  server_name cxsync.codexsun.com;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name cxsync.codexsun.com;

  ssl_certificate /etc/letsencrypt/live/cxsync.codexsun.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/cxsync.codexsun.com/privkey.pem;

  client_max_body_size 10m;

  location / {
    proxy_pass http://127.0.0.1:6077;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
