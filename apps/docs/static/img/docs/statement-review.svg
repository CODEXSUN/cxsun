<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Statement review</title>
  <desc id="desc">Customer statement with opening, transactions, and closing balance.</desc>
  <rect width="960" height="360" rx="18" fill="#f8fafc"/>
  <rect x="72" y="44" width="816" height="272" rx="16" fill="#ffffff" stroke="#dbe3ea"/>
  <text x="108" y="88" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#122033">Customer Statement</text>
  <rect x="108" y="116" width="190" height="50" rx="10" fill="#eff6ff"/><text x="128" y="148" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1d4ed8">Opening balance</text>
  <rect x="322" y="116" width="190" height="50" rx="10" fill="#ecfdf5"/><text x="342" y="148" font-family="Inter, Arial, sans-serif" font-size="13" fill="#166534">Sales and receipts</text>
  <rect x="536" y="116" width="190" height="50" rx="10" fill="#fff7ed"/><text x="556" y="148" font-family="Inter, Arial, sans-serif" font-size="13" fill="#9a3412">Closing balance</text>
  <rect x="108" y="196" width="716" height="78" rx="10" fill="#ffffff" stroke="#dbe3ea"/>
  <line x1="108" y1="222" x2="824" y2="222" stroke="#e2e8f0"/>
  <line x1="108" y1="248" x2="824" y2="248" stroke="#e2e8f0"/>
  <g font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">
    <text x="130" y="214">Date</text><text x="230" y="214">Document</text><text x="440" y="214">Debit</text><text x="560" y="214">Credit</text><text x="690" y="214">Balance</text>
    <text x="130" y="240">14-06-2026</text><text x="230" y="240">SAL-0001</text><text x="440" y="240">12,500</text><text x="560" y="240">-</text><text x="690" y="240">12,500</text>
  </g>
</svg>
