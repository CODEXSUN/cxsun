<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Receipt and payment flow</title>
  <desc id="desc">Receipts and payments allocate money against open documents.</desc>
  <rect width="960" height="360" rx="18" fill="#f8fafc"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="70" y="76" font-size="24" font-weight="700" fill="#122033">Money entry flow</text>
    <rect x="82" y="120" width="236" height="132" rx="14" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="112" y="162" font-size="18" font-weight="700" fill="#166534">Receipt</text>
    <text x="112" y="192" font-size="13" fill="#166534">Money received</text>
    <text x="112" y="214" font-size="13" fill="#166534">Allocate to open invoices</text>
    <rect x="362" y="120" width="236" height="132" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="392" y="162" font-size="18" font-weight="700" fill="#9a3412">Payment</text>
    <text x="392" y="192" font-size="13" fill="#9a3412">Money paid</text>
    <text x="392" y="214" font-size="13" fill="#9a3412">Allocate to open bills</text>
    <rect x="642" y="120" width="236" height="132" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="672" y="162" font-size="18" font-weight="700" fill="#1d4ed8">Statement</text>
    <text x="672" y="192" font-size="13" fill="#1d4ed8">Check balance</text>
    <text x="672" y="214" font-size="13" fill="#1d4ed8">Review pending amount</text>
  </g>
</svg>
