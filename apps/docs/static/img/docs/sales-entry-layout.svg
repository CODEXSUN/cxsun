<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Sales entry layout</title>
  <desc id="desc">Sales entry form with details tabs and sales item table.</desc>
  <rect width="960" height="360" rx="18" fill="#f8fafc"/>
  <rect x="58" y="34" width="844" height="292" rx="14" fill="#ffffff" stroke="#dbe3ea"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="88" y="72" font-size="20" font-weight="700" fill="#122033">Sales entry screen</text>
    <rect x="88" y="96" width="560" height="36" rx="8" fill="#f8fafc" stroke="#dbe3ea"/>
    <text x="108" y="119" font-size="13" fill="#0f172a">Details</text><text x="184" y="119" font-size="13" fill="#64748b">Address</text><text x="270" y="119" font-size="13" fill="#64748b">E-way</text><text x="344" y="119" font-size="13" fill="#64748b">E-invoice</text><text x="444" y="119" font-size="13" fill="#64748b">Terms</text>
    <rect x="88" y="154" width="360" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1"/><text x="104" y="180" font-size="12" fill="#475569">Customer name</text>
    <rect x="488" y="154" width="170" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1"/><text x="504" y="180" font-size="12" fill="#475569">Invoice no</text>
    <rect x="88" y="212" width="360" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1"/><text x="104" y="238" font-size="12" fill="#475569">Sales Ledger</text>
    <rect x="488" y="212" width="170" height="42" rx="8" fill="#ffffff" stroke="#cbd5e1"/><text x="504" y="238" font-size="12" fill="#475569">Sales tax type</text>
    <text x="88" y="286" font-size="16" font-weight="700" fill="#047857">Sales Items</text>
    <rect x="208" y="268" width="584" height="36" rx="8" fill="#f8fafc" stroke="#dbe3ea"/><text x="230" y="291" font-size="12" fill="#475569">PO / DC / product / description / quantity / rate / tax</text>
  </g>
</svg>
