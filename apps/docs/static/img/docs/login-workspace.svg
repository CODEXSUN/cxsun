<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Login checklist</title>
  <desc id="desc">Login screen and first checks after login.</desc>
  <rect width="960" height="360" rx="18" fill="#f8fafc"/>
  <rect x="70" y="48" width="300" height="264" rx="18" fill="#ffffff" stroke="#dbe3ea"/>
  <text x="106" y="96" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#122033">Sign in</text>
  <rect x="106" y="126" width="226" height="38" rx="8" fill="#f1f5f9" stroke="#dbe3ea"/>
  <text x="122" y="150" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">Email</text>
  <rect x="106" y="178" width="226" height="38" rx="8" fill="#f1f5f9" stroke="#dbe3ea"/>
  <text x="122" y="202" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">Password</text>
  <rect x="106" y="232" width="226" height="42" rx="8" fill="#0f766e"/>
  <text x="190" y="258" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Login</text>
  <path d="M402 180h84" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <path d="m480 172 10 8-10 8" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="520" y="48" width="370" height="264" rx="18" fill="#ffffff" stroke="#dbe3ea"/>
  <text x="556" y="94" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#122033">Check before work</text>
  <g font-family="Inter, Arial, sans-serif" font-size="15" fill="#334155">
    <circle cx="568" cy="136" r="8" fill="#10b981"/><text x="588" y="141">Correct company</text>
    <circle cx="568" cy="176" r="8" fill="#10b981"/><text x="588" y="181">Correct accounting year</text>
    <circle cx="568" cy="216" r="8" fill="#10b981"/><text x="588" y="221">Needed menu is visible</text>
    <circle cx="568" cy="256" r="8" fill="#10b981"/><text x="588" y="261">Logout option is available</text>
