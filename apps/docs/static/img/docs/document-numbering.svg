<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Document numbering</title>
  <desc id="desc">Document number parts combine prefix, number, and suffix.</desc>
  <rect width="960" height="360" rx="18" fill="#f8fafc"/>
  <text x="82" y="78" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#122033">Document numbering</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="92" y="132" width="160" height="90" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="130" y="168" font-size="15" font-weight="700" fill="#1d4ed8">Prefix</text>
    <text x="130" y="194" font-size="14" fill="#1d4ed8">SAL</text>
    <text x="292" y="184" font-size="26" font-weight="700" fill="#94a3b8">+</text>
    <rect x="342" y="132" width="160" height="90" rx="14" fill="#ecfdf5" stroke="#bbf7d0"/>
    <text x="380" y="168" font-size="15" font-weight="700" fill="#166534">Number</text>
    <text x="380" y="194" font-size="14" fill="#166534">0001</text>
    <text x="542" y="184" font-size="26" font-weight="700" fill="#94a3b8">+</text>
    <rect x="592" y="132" width="160" height="90" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="630" y="168" font-size="15" font-weight="700" fill="#9a3412">Suffix</text>
    <text x="630" y="194" font-size="14" fill="#9a3412">2026</text>
    <text x="790" y="184" font-size="26" font-weight="700" fill="#94a3b8">=</text>
    <rect x="82" y="260" width="796" height="48" rx="12" fill="#ffffff" stroke="#dbe3ea"/>
    <text x="388" y="291" font-size="17" font-weight="700" fill="#122033">SAL-0001-2026</text>
  </g>
</svg>
