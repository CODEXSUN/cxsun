  <path d="M128 238c120 58 584 58 704 0" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <text x="308" y="294" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">Good setup makes every invoice and report easier to trust.</text>
