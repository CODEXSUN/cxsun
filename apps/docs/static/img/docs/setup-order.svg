<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Setup order</title>
  <desc id="desc">Recommended order for company, common records, contacts, products, numbering, and entries.</desc>
  <rect width="960" height="360" rx="18" fill="#f8fafc"/>
  <text x="64" y="74" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#122033">Recommended setup order</text>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(64 112)"><rect width="124" height="86" rx="12" fill="#dbeafe"/><text x="20" y="34" font-size="14" font-weight="700" fill="#1d4ed8">Company</text><text x="20" y="58" font-size="12" fill="#1e3a8a">Profile and GST</text></g>
    <g transform="translate(208 112)"><rect width="124" height="86" rx="12" fill="#ccfbf1"/><text x="20" y="34" font-size="14" font-weight="700" fill="#0f766e">Common</text><text x="20" y="58" font-size="12" fill="#115e59">Units, tax, HSN</text></g>
    <g transform="translate(352 112)"><rect width="124" height="86" rx="12" fill="#dcfce7"/><text x="20" y="34" font-size="14" font-weight="700" fill="#166534">Contacts</text><text x="20" y="58" font-size="12" fill="#14532d">Customers</text></g>
    <g transform="translate(496 112)"><rect width="124" height="86" rx="12" fill="#fef3c7"/><text x="20" y="34" font-size="14" font-weight="700" fill="#92400e">Products</text><text x="20" y="58" font-size="12" fill="#78350f">Items and rates</text></g>
    <g transform="translate(640 112)"><rect width="124" height="86" rx="12" fill="#fee2e2"/><text x="20" y="34" font-size="14" font-weight="700" fill="#991b1b">Numbering</text><text x="20" y="58" font-size="12" fill="#7f1d1d">Invoice format</text></g>
    <g transform="translate(784 112)"><rect width="124" height="86" rx="12" fill="#ede9fe"/><text x="20" y="34" font-size="14" font-weight="700" fill="#5b21b6">Entries</text><text x="20" y="58" font-size="12" fill="#4c1d95">Daily work</text></g>
