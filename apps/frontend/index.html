<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="version" content="1.0.131" />
    <title>Codexsun</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #ffffff;
        color: #171717;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .startup-screen {
        display: grid;
        min-height: 100vh;
        min-height: 100svh;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .startup-logo {
        width: 48px;
        height: 48px;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
          color: #fafafa;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="startup-screen">
        <img class="startup-logo" src="/logo.svg" alt="" aria-hidden="true" />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
