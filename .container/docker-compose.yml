name: cxsun

services:
  cxsun:
    build:
      context: ..
      dockerfile: .container/Dockerfile
    image: cxsun:v1
    container_name: cxsun
    restart: unless-stopped
    environment:
      GIT_REPO_URL: ${GIT_REPO_URL:-https://github.com/CODEXSUN/cxsun.git}
      GIT_BRANCH: ${GIT_BRANCH:-main}
      GIT_PULL_ON_START: ${GIT_PULL_ON_START:-false}
      NODE_OPTIONS: ${NODE_OPTIONS:---max-http-header-size=65536}
      APP_DIR: /workspace/cxsun
      HOST: 0.0.0.0
      PORT: ${PORT:-6005}
      PLATFORM_API_PORT: ${PLATFORM_API_PORT:-6105}
      BILLING_API_PORT: ${BILLING_API_PORT:-6205}
      ECOMMERCE_API_PORT: ${ECOMMERCE_API_PORT:-6305}
      VITE_PLATFORM_API_BASE_URL: ${VITE_PLATFORM_API_BASE_URL:-https://platform-api.codexsun.com}
      VITE_BILLING_API_BASE_URL: ${VITE_BILLING_API_BASE_URL:-https://billing-api.codexsun.com}
      VITE_ECOMMERCE_API_BASE_URL: ${VITE_ECOMMERCE_API_BASE_URL:-https://ecommerce-api.codexsun.com}
      VITE_PORT: ${VITE_PORT:-6010}
      DOCS_PORT: ${DOCS_PORT:-6020}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://codexsun.com}
      VITE_STORAGE_BASE_URL: ${VITE_STORAGE_BASE_URL:-https://codexsun.com}
      VITE_MEDIA_MANAGER_URL: ${VITE_MEDIA_MANAGER_URL:-http://localhost:6050}
      CXMEDIA_ADMIN_PASSWORD: ${CXMEDIA_ADMIN_PASSWORD:-Sundarcomputers@123}
      FRONTEND_URL: ${FRONTEND_URL:-https://codexsun.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://codexsun.com,https://www.codexsun.com}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-cxsun_master}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-DbPass1@@}
      JWT_SECRET: ${JWT_SECRET:-}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      SOFTWARE_ADMIN_NAME: ${SOFTWARE_ADMIN_NAME:-}
      SOFTWARE_ADMIN_EMAIL: ${SOFTWARE_ADMIN_EMAIL:-}
      SOFTWARE_ADMIN_PASSWORD: ${SOFTWARE_ADMIN_PASSWORD:-}
      TENANT_ADMIN_NAME: ${TENANT_ADMIN_NAME:-}
      TENANT_ADMIN_EMAIL: ${TENANT_ADMIN_EMAIL:-}
      TENANT_ADMIN_PASSWORD: ${TENANT_ADMIN_PASSWORD:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_TLS: ${REDIS_TLS:-false}
      QUEUE_ENABLED: ${QUEUE_ENABLED:-true}
      DATABASE_BACKUP_INTERVAL_HOURS: ${DATABASE_BACKUP_INTERVAL_HOURS:-6}
      INSTALL_RUN_TESTS: ${INSTALL_RUN_TESTS:-false}
      AUTO_SEED_TENANT_DOMAINS: ${AUTO_SEED_TENANT_DOMAINS:-false}
      SKIP_MARIADB_WAIT: ${SKIP_MARIADB_WAIT:-true}
      HEALTH_WAIT_SECONDS: ${HEALTH_WAIT_SECONDS:-900}
      CLOUD_DOCS_ENABLED: ${CLOUD_DOCS_ENABLED:-true}
      CLOUD_PRODUCT_APPS: ${CLOUD_PRODUCT_APPS:-auditor:6030,ecommerce:6031,b2b-connect:6032,sports:6033,learning:6034,welfare:6035,crm:6036,sites:6037,blog:6038,zetro:6039,textile-lab:6040,garment:6041,upvc:6042,b2b-connect-admin:6043,cxsync:6044}
      CLOUD_CXSYNC_CLOUD_ENABLED: ${CLOUD_CXSYNC_CLOUD_ENABLED:-false}
      CXSYNC_CLOUD_PORT: ${CXSYNC_CLOUD_PORT:-6077}
      CXSYNC_CLOUD_HOST: ${CXSYNC_CLOUD_HOST:-0.0.0.0}
      CXSYNC_CLOUD_LOG_LEVEL: ${CXSYNC_CLOUD_LOG_LEVEL:-info}
      CXSYNC_SERVICE_KEY: ${CXSYNC_SERVICE_KEY:-}
      CXSYNC_FLEET_CLONE_ENABLED: ${CXSYNC_FLEET_CLONE_ENABLED:-false}
      CXSYNC_FLEET_SOURCE_QUIESCED: ${CXSYNC_FLEET_SOURCE_QUIESCED:-false}
      CXSYNC_FLEET_DUMP_PATH: ${CXSYNC_FLEET_DUMP_PATH:-mariadb-dump}
      CXSYNC_FLEET_CLIENT_PATH: ${CXSYNC_FLEET_CLIENT_PATH:-mariadb}
    ports:
      - "${PORT:-6005}:${PORT:-6005}"
      - "${VITE_PORT:-6010}:${VITE_PORT:-6010}"
      - "${DOCS_PORT:-6020}:${DOCS_PORT:-6020}"
      - "6030-6044:6030-6044"
      - "${CXSYNC_CLOUD_PORT:-6077}:${CXSYNC_CLOUD_PORT:-6077}"
    volumes:
      - cxsun-volume:/workspace
      - cxmedia-storage:/workspace/cxsun/storage
    networks:
      - codexion-network

  platform-api:
    build:
      context: ..
      dockerfile: .container/Dockerfile
    image: cxsun:platform-api
    container_name: cxsun-platform-api
    restart: unless-stopped
    environment:
      CXSUN_RUNTIME_MODE: platform-api
      GIT_REPO_URL: ${GIT_REPO_URL:-https://github.com/CODEXSUN/cxsun.git}
      GIT_BRANCH: ${GIT_BRANCH:-main}
      GIT_PULL_ON_START: ${GIT_PULL_ON_START:-true}
      APP_DIR: /workspace/cxsun
      NODE_OPTIONS: ${NODE_OPTIONS:---max-http-header-size=65536}
      HOST: 0.0.0.0
      PLATFORM_API_PORT: ${PLATFORM_API_PORT:-6105}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-cxsun_master}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-DbPass1@@}
      JWT_SECRET: ${JWT_SECRET:-}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      SOFTWARE_ADMIN_NAME: ${SOFTWARE_ADMIN_NAME:-}
      SOFTWARE_ADMIN_EMAIL: ${SOFTWARE_ADMIN_EMAIL:-}
      SOFTWARE_ADMIN_PASSWORD: ${SOFTWARE_ADMIN_PASSWORD:-}
      TENANT_ADMIN_NAME: ${TENANT_ADMIN_NAME:-}
      TENANT_ADMIN_EMAIL: ${TENANT_ADMIN_EMAIL:-}
      TENANT_ADMIN_PASSWORD: ${TENANT_ADMIN_PASSWORD:-}
      SKIP_MARIADB_WAIT: ${SKIP_MARIADB_WAIT:-true}
      HEALTH_WAIT_SECONDS: ${HEALTH_WAIT_SECONDS:-900}
    ports:
      - "${PLATFORM_API_PORT:-6105}:${PLATFORM_API_PORT:-6105}"
    volumes:
      - cxsun-platform-api-workspace:/workspace
      - cxmedia-storage:/workspace/cxsun/storage
    networks:
      - codexion-network

  billing-api:
    build:
      context: ..
      dockerfile: .container/Dockerfile
    image: cxsun:billing-api
    container_name: cxsun-billing-api
    restart: unless-stopped
    environment:
      CXSUN_RUNTIME_MODE: billing-api
      GIT_REPO_URL: ${GIT_REPO_URL:-https://github.com/CODEXSUN/cxsun.git}
      GIT_BRANCH: ${GIT_BRANCH:-main}
      GIT_PULL_ON_START: ${GIT_PULL_ON_START:-true}
      APP_DIR: /workspace/cxsun
      NODE_OPTIONS: ${NODE_OPTIONS:---max-http-header-size=65536}
      HOST: 0.0.0.0
      BILLING_API_PORT: ${BILLING_API_PORT:-6205}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-cxsun_master}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-DbPass1@@}
      JWT_SECRET: ${JWT_SECRET:-}
      SKIP_MARIADB_WAIT: ${SKIP_MARIADB_WAIT:-true}
      HEALTH_WAIT_SECONDS: ${HEALTH_WAIT_SECONDS:-900}
    ports:
      - "${BILLING_API_PORT:-6205}:${BILLING_API_PORT:-6205}"
    volumes:
      - cxsun-billing-api-workspace:/workspace
      - cxmedia-storage:/workspace/cxsun/storage
    networks:
      - codexion-network

  ecommerce-api:
    build:
      context: ..
      dockerfile: .container/Dockerfile
    image: cxsun:ecommerce-api
    container_name: cxsun-ecommerce-api
    restart: unless-stopped
    environment:
      CXSUN_RUNTIME_MODE: ecommerce-api
      GIT_REPO_URL: ${GIT_REPO_URL:-https://github.com/CODEXSUN/cxsun.git}
      GIT_BRANCH: ${GIT_BRANCH:-main}
      GIT_PULL_ON_START: ${GIT_PULL_ON_START:-true}
      APP_DIR: /workspace/cxsun
      NODE_OPTIONS: ${NODE_OPTIONS:---max-http-header-size=65536}
      HOST: 0.0.0.0
      ECOMMERCE_API_PORT: ${ECOMMERCE_API_PORT:-6305}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-cxsun_master}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-DbPass1@@}
      JWT_SECRET: ${JWT_SECRET:-}
      SKIP_MARIADB_WAIT: ${SKIP_MARIADB_WAIT:-true}
      HEALTH_WAIT_SECONDS: ${HEALTH_WAIT_SECONDS:-900}
    ports:
      - "${ECOMMERCE_API_PORT:-6305}:${ECOMMERCE_API_PORT:-6305}"
    volumes:
      - cxsun-ecommerce-api-workspace:/workspace
      - cxmedia-storage:/workspace/cxsun/storage
    networks:
      - codexion-network

  cxsync-maintenance:
    build:
      context: ..
      dockerfile: .container/Dockerfile
    image: cxsun:cxsync-maintenance
    container_name: cxsun-cxsync-maintenance
    restart: unless-stopped
    environment:
      CXSUN_RUNTIME_MODE: cxsync-maintenance
      GIT_REPO_URL: ${GIT_REPO_URL:-https://github.com/CODEXSUN/cxsun.git}
      GIT_BRANCH: ${GIT_BRANCH:-main}
      GIT_PULL_ON_START: ${GIT_PULL_ON_START:-true}
      APP_DIR: /workspace/cxsun
      NODE_OPTIONS: ${NODE_OPTIONS:---max-http-header-size=65536}
      HOST: 0.0.0.0
      VITE_PORT: 6044
      CXSYNC_MAINTENANCE_WEB_PORT: 6044
      CXSYNC_CLOUD_PORT: 6077
      CXSYNC_CLOUD_HOST: 0.0.0.0
      CXSYNC_CLOUD_LOG_LEVEL: ${CXSYNC_CLOUD_LOG_LEVEL:-info}
      CXSYNC_CLOUD_PUBLIC_URL: ${CXSYNC_CLOUD_PUBLIC_URL:-https://cxsync.codexsun.com}
      CXSYNC_CLOUD_SKIP_PLATFORM_MIGRATIONS: "true"
      CXSYNC_EXPECTED_VERSION: ${CXSYNC_EXPECTED_VERSION:-1.0.128}
      CXSYNC_SERVICE_KEY: ${CXSYNC_SERVICE_KEY:-}
      CXSYNC_FLEET_CLONE_ENABLED: ${CXSYNC_FLEET_CLONE_ENABLED:-false}
      CXSYNC_FLEET_SOURCE_QUIESCED: ${CXSYNC_FLEET_SOURCE_QUIESCED:-false}
      CXSYNC_FLEET_DUMP_PATH: ${CXSYNC_FLEET_DUMP_PATH:-mariadb-dump}
      CXSYNC_FLEET_CLIENT_PATH: ${CXSYNC_FLEET_CLIENT_PATH:-mariadb}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-cxsun_master}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-SUNDAR}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://cxsync.codexsun.com}
      QUEUE_ENABLED: "false"
      SKIP_MARIADB_WAIT: "true"
    ports:
      - "${CXSYNC_MAINTENANCE_WEB_HOST_PORT:-6080}:6044"
      - "${CXSYNC_MAINTENANCE_API_HOST_PORT:-6078}:6077"
    volumes:
      - cxsync-maintenance-workspace:/workspace
      - cxsync-maintenance-storage:/workspace/cxsun/storage
    networks:
      - codexion-network

  cxmedia:
    image: filebrowser/filebrowser:v2.63.5
    container_name: cxmedia
    restart: unless-stopped
    user: "0:0"
    command: ["--address", "0.0.0.0", "--port", "80", "--root", "/srv", "--database", "/database/filebrowser.db", "--username", "admin", "--password", "${CXMEDIA_ADMIN_PASSWORD:-Sundarcomputers@123}"]
    ports:
      - "${CXMEDIA_PORT:-6050}:80"
    volumes:
      - cxmedia-storage:/srv
      - cxmedia-db:/database
    networks:
      - codexion-network

volumes:
  cxsun-volume:
    name: cxsun-volume
  cxsync-maintenance-workspace:
    name: cxsync-maintenance-workspace
  cxsun-platform-api-workspace:
    name: cxsun-platform-api-workspace
  cxsun-billing-api-workspace:
    name: cxsun-billing-api-workspace
  cxsun-ecommerce-api-workspace:
    name: cxsun-ecommerce-api-workspace
  cxsync-maintenance-storage:
    name: cxsync-maintenance-storage
  cxmedia-storage:
    name: ${CXMEDIA_STORAGE_VOLUME:-cxmedia-storage}
    external: true
  cxmedia-db:
    name: ${CXMEDIA_DB_VOLUME:-cxmedia-db}
    external: true

networks:
  codexion-network:
    external: true
