name: cxsun-billing

services:
  platform-api:
    build:
      context: ../..
      dockerfile: .container/billing/Dockerfile.platform-api
    image: ${PLATFORM_API_IMAGE:-cxsun/platform-api:latest}
    container_name: ${PLATFORM_API_CONTAINER_NAME:-cxsun-billing-platform-api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CXSUN_LOG_FORMAT: ${CXSUN_LOG_FORMAT:-json}
      HOST: 0.0.0.0
      PLATFORM_API_PORT: 6105
      FRONTEND_URL: ${BILLING_FRONTEND_URL:-https://billing.codexsun.com}
      CORS_ORIGINS: ${BILLING_CORS_ORIGINS:-https://billing.codexsun.com}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-cxsun_master}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_TLS: ${REDIS_TLS:-false}
      QUEUE_ENABLED: ${QUEUE_ENABLED:-true}
    ports:
      - "${PLATFORM_API_HOST_PORT:-6105}:6105"
    volumes:
      - billing-storage:/app/storage
    networks:
      - codexion-network
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:6105/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 10

  billing-api:
    build:
      context: ../..
      dockerfile: .container/billing/Dockerfile.billing-api
    image: ${BILLING_API_IMAGE:-cxsun/billing-api:latest}
    container_name: ${BILLING_API_CONTAINER_NAME:-cxsun-billing-api}
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      CXSUN_LOG_FORMAT: ${CXSUN_LOG_FORMAT:-json}
      HOST: 0.0.0.0
      BILLING_API_PORT: 6205
      FRONTEND_URL: ${BILLING_FRONTEND_URL:-https://billing.codexsun.com}
      CORS_ORIGINS: ${BILLING_CORS_ORIGINS:-https://billing.codexsun.com}
      PLATFORM_API_BASE_URL: ${PLATFORM_API_INTERNAL_URL:-http://platform-api:6105}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-cxsun_master}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_TLS: ${REDIS_TLS:-false}
      QUEUE_ENABLED: ${QUEUE_ENABLED:-true}
    ports:
      - "${BILLING_API_HOST_PORT:-6205}:6205"
    volumes:
      - billing-storage:/app/storage
    networks:
      - codexion-network
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:6205/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 10

  billing-frontend:
    build:
      context: ../..
      dockerfile: .container/billing/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://platform-api.codexsun.com}
        VITE_PLATFORM_API_BASE_URL: ${VITE_PLATFORM_API_BASE_URL:-https://platform-api.codexsun.com}
        VITE_BILLING_API_BASE_URL: ${VITE_BILLING_API_BASE_URL:-https://billing-api.codexsun.com}
        VITE_STORAGE_BASE_URL: ${VITE_STORAGE_BASE_URL:-https://platform-api.codexsun.com}
        VITE_MEDIA_MANAGER_URL: ${VITE_MEDIA_MANAGER_URL:-https://media.codexsun.com}
    image: ${BILLING_FRONTEND_IMAGE:-cxsun/billing-frontend:latest}
    container_name: ${BILLING_FRONTEND_CONTAINER_NAME:-cxsun-billing-frontend}
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
      billing-api:
        condition: service_healthy
    ports:
      - "${BILLING_FRONTEND_HOST_PORT:-6010}:80"
    networks:
      - codexion-network

volumes:
  billing-storage:
    name: ${BILLING_STORAGE_VOLUME:-cxmedia-storage}
    external: true

networks:
  codexion-network:
    name: ${CXSUN_DOCKER_NETWORK:-codexion-network}
    external: true
